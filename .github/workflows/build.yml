name: Build Mobile Apps

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Create Flutter Project Structure
      run: flutter create .
      
    # 💡 تنظیم قطعی نام برند در سیستم‌عامل اندروید
    - name: Set Android App Name
      run: |
        sed -i 's/android:label="[^"]*"/android:label="ایران‌اربیل IranErbil"/g' android/app/src/main/AndroidManifest.xml

    - name: Add Internet Permission
      run: |
        sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET" \/>\n    <application/g' android/app/src/main/AndroidManifest.xml

    # 💡 تزریق لینک‌های عمیق تلگرام (با نام لیبل جدید)
    - name: Inject Deep Link Intent Filter
      run: |
        sed -i '/<\/intent-filter>/a \        <intent-filter android:label="ایران‌اربیل IranErbil">\n            <action android:name="android.intent.action.VIEW" \/>\n            <category android:name="android.intent.category.DEFAULT" \/>\n            <category android:name="android.intent.category.BROWSABLE" \/>\n            <data android:scheme="https" android:host="script.google.com" android:pathPrefix="\/macros\/s\/AKfycbyC4r6ETL4TpC3FQIMjDd2gJoTB5mijctOcHXLbkCV68aeCb0EKr5QHpzbJpcqE3BQv\/exec" \/>\n        <\/intent-filter>' android/app/src/main/AndroidManifest.xml
        
    - name: Install Dependencies
      run: flutter pub get

    - name: Generate App Icons and Splash
      run: |
        dart run flutter_launcher_icons
        dart run flutter_native_splash:create

    - name: Build APK
      run: flutter build apk --release

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: iran-erbil-android-apk
        path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Create Flutter Project Structure
      run: flutter create .
      
    # 💡 تنظیم قطعی نام برند در سیستم‌عامل آی‌اواس (آیفون)
    - name: Set iOS App Name
      run: |
        plutil -replace CFBundleDisplayName -string "ایران‌اربیل IranErbil" ios/Runner/Info.plist
        plutil -replace CFBundleName -string "ایران‌اربیل IranErbil" ios/Runner/Info.plist
        
    - name: Install Dependencies
      run: flutter pub get

    - name: Generate App Icons and Splash
      run: |
        dart run flutter_launcher_icons
        dart run flutter_native_splash:create

    - name: Build iOS Xcode Project
      run: flutter build ios --release --no-codesign

    - name: Compress iOS Output
      run: tar -czf ios-project.tar.gz build/ios/iphoneos

    - name: Upload iOS Project
      uses: actions/upload-artifact@v4
      with:
        name: iran-erbil-ios-project
        path: ios-project.tar.gz