# نسخه: V_20260710_0007_CLOUD_COMPILER_PROGUARD_FIX
# ========================================================
name: Build Mobile Apps

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Create Flutter Project Structure
      run: flutter create .
      
    - name: Install Dependencies
      run: flutter pub get

    # 💡 جراحی طلایی: اصلاح کلمه‌ی ممنوعه داخل فایل‌های افزونه در سرور
    - name: Fix Proguard Error in Plugin
      run: |
        sed -i "s/proguard-android.txt/proguard-android-optimize.txt/g" /home/runner/.pub-cache/hosted/pub.dev/flutter_inappwebview_android-*/android/build.gradle

    - name: Generate App Icons and Splash
      run: |
        dart run flutter_launcher_icons
        dart run flutter_native_splash:create

    - name: Build APK
      run: flutter build apk --release

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: iran-erbil-android-apk
        path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Create Flutter Project Structure
      run: flutter create .
        
    - name: Install Dependencies
      run: flutter pub get

    - name: Generate App Icons and Splash
      run: |
        dart run flutter_launcher_icons
        dart run flutter_native_splash:create

    - name: Build iOS Xcode Project
      run: flutter build ios --release --no-codesign

    - name: Compress iOS Output
      run: tar -czf ios-project.tar.gz build/ios/iphoneos

    - name: Upload iOS Project
      uses: actions/upload-artifact@v4
      with:
        name: iran-erbil-ios-project
        path: ios-project.tar.gz