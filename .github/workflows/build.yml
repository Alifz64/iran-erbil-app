# Version: V_20260710_1534_BUILD_FINAL_HYBRID
name: Build Mobile Apps

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Create Flutter Project Structure
      run: flutter create .
      
    # 💡 اصلاح مهندسی ساختار اندروید با پایتون برای اعمال نام، دسترسی اینترنت و پیوندهای عمیق بدون خطای کاراکتری
    - name: Configure Android Manifest via Python
      run: |
        python3 -c "
        path = 'android/app/src/main/AndroidManifest.xml'
        with open(path, 'r') as f: text = f.read()
        import re
        
        # ۱. تنظیم نام برند اپلیکیشن
        text = re.sub(r'android:label=\"[^\"]*\"', 'android:label=\"ایران‌اربیل IranErbil\"', text, count=1)
        
        # ۲. اضافه کردن دسترسی اینترنت
        if 'android.permission.INTERNET' not in text:
            text = text.replace('<manifest', '<manifest>\n    <uses-permission android:name=\"android.permission.INTERNET\" />')
        
        # ۳. تزریق کدهای بدون نقص اینتنت‌فیلتر پیوندهای عمیق (پروتکل وب و پروتکل اختصاصی)
        deep_links = '''        <intent-filter android:label=\"ایران‌اربیل IranErbil\">
                    <action android:name=\"android.intent.action.VIEW\" />
                    <category android:name=\"android.intent.category.DEFAULT\" />
                    <category android:name=\"android.intent.category.BROWSABLE\" />
                    <data android:scheme=\"https\" android:host=\"script.google.com\" android:pathPrefix=\"/macros/s/AKfycbyC4r6ETL4TpC3FQIMjDd2gJoTB5mijctOcHXLbkCV68aeCb0EKr5QHpzbJpcqE3BQv/exec\" />
                    <data android:scheme=\"https\" android:host=\"script.googleusercontent.com\" />
                </intent-filter>
                <intent-filter>
                    <action android:name=\"android.intent.action.VIEW\" />
                    <category android:name=\"android.intent.category.DEFAULT\" />
                    <category android:name=\"android.intent.category.BROWSABLE\" />
                    <data android:scheme=\"iranerbil\" android:host=\"auth\" />
                </intent-filter>'''
        
        text = text.replace('</intent-filter>', '</intent-filter>\n' + deep_links)
        
        with open(path, 'w') as f: f.write(text)
        print('Android Configuration Completed Successfully.')
        "

    - name: Install Dependencies
      run: flutter pub get

    - name: Generate App Icons and Splash
      run: |
        dart run flutter_launcher_icons
        dart run flutter_native_splash:create

    - name: Build APK
      run: flutter build apk --release

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: iran-erbil-android-apk
        path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Create Flutter Project Structure
      run: flutter create .
      
    - name: Set iOS App Name
      run: |
        plutil -replace CFBundleDisplayName -string "ایران‌اربیل IranErbil" ios/Runner/Info.plist
        plutil -replace CFBundleName -string "ایران‌اربیل IranErbil" ios/Runner/Info.plist
        
    - name: Install Dependencies
      run: flutter pub get

    - name: Generate App Icons and Splash
      run: |
        dart run flutter_launcher_icons
        dart run flutter_native_splash:create

    - name: Build iOS Xcode Project
      run: flutter build ios --release --no-codesign

    - name: Compress iOS Output
      run: tar -czf ios-project.tar.gz build/ios/iphoneos

    - name: Upload iOS Project
      uses: actions/upload-artifact@v4
      with:
        name: iran-erbil-ios-project
        path: ios-project.tar.gz