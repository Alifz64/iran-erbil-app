# ========================================================
name: Build Mobile Apps

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Create Flutter Project Structure
      run: flutter create .
      
    - name: Configure Android Manifest via Python
      run: |
        python3 -c "
        path = 'android/app/src/main/AndroidManifest.xml'
        with open(path, 'r') as f: text = f.read()
        import re
        text = re.sub(r'android:label=\"[^\"]*\"', 'android:label=\"ایران‌اربیل IranErbil\"', text, count=1)
        
        if 'android.permission.INTERNET' not in text:
            text = text.replace('<application', '<uses-permission android:name=\"android.permission.INTERNET\" />\n    <application')
        
        deep_links = '''        <intent-filter android:autoVerify=\"true\">
                    <action android:name=\"android.intent.action.VIEW\" />
                    <category android:name=\"android.intent.category.DEFAULT\" />
                    <category android:name=\"android.intent.category.BROWSABLE\" />
                    <data android:scheme=\"https\" android:host=\"script.google.com\" android:pathPrefix=\"/macros/s/AKfycbyC4r6ETL4TpC3FQIMjDd2gJoTB5mijctOcHXLbkCV68aeCb0EKr5QHpzbJpcqE3BQv/exec\" />
                    <data android:scheme=\"https\" android:host=\"script.googleusercontent.com\" />
                </intent-filter>
                <intent-filter>
                    <action android:name=\"android.intent.action.VIEW\" />
                    <category android:name=\"android.intent.category.DEFAULT\" />
                    <category android:name=\"android.intent.category.BROWSABLE\" />
                    <data android:scheme=\"iranerbil\" android:host=\"auth\" />
                </intent-filter>'''
        
        if 'script.google.com' not in text:
            text = text.replace('</intent-filter>', '</intent-filter>\n' + deep_links, 1)
        
        with open(path, 'w') as f: f.write(text)
        print('Android Configuration Completed Successfully.')
        "

    - name: Install Dependencies
      run: flutter pub get

    - name: Generate App Icons and Splash
      run: |
        dart run flutter_launcher_icons
        dart run flutter_native_splash:create

    - name: Build APK
      run: flutter build apk --release

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: iran-erbil-android-apk
        path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Create Flutter Project Structure
      run: flutter create .
      
    - name: Configure iOS Info.plist
      run: |
        plutil -replace CFBundleDisplayName -string "ایران‌اربیل IranErbil" ios/Runner/Info.plist
        plutil -replace CFBundleName -string "ایران‌اربیل IranErbil" ios/Runner/Info.plist
        python3 -c "
        path = 'ios/Runner/Info.plist'
        with open(path, 'r') as f: text = f.read()
        url_scheme = '''
        <key>CFBundleURLTypes</key>
        <array>
          <dict>
            <key>CFBundleURLName</key>
            <string>com.iranerbil.app</string>
            <key>CFBundleURLSchemes</key>
            <array>
              <string>iranerbil</string>
            </array>
          </dict>
        </array>
        '''
        if 'CFBundleURLTypes' not in text:
            text = text.replace('</dict>\n</plist>', url_scheme + '</dict>\n</plist>')
            with open(path, 'w') as f: f.write(text)
        "
        
    - name: Install Dependencies
      run: flutter pub get

    - name: Generate App Icons and Splash
      run: |
        dart run flutter_launcher_icons
        dart run flutter_native_splash:create

    - name: Build iOS Xcode Project
      run: flutter build ios --release --no-codesign

    - name: Compress iOS Output
      run: tar -czf ios-project.tar.gz build/ios/iphoneos

    - name: Upload iOS Project
      uses: actions/upload-artifact@v4
      with:
        name: iran-erbil-ios-project
        path: ios-project.tar.gz