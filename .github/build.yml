# Version: V_20260709_2236_CLOUD_COMPILER_WITH_ASSETS
name: Build Mobile Apps

on:
  push:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Install Dependencies
      run: flutter pub get

    # 💡 دستور جادویی برای ساخت آیکون‌ها و اسپلش در اندروید
    - name: Generate App Icons and Splash
      run: |
        dart run flutter_launcher_icons
        dart run flutter_native_splash:create

    - name: Build APK
      run: flutter build apk --release

    - name: Upload Android APK
      uses: actions/upload-artifact@v3
      with:
        name: iran-erbil-android-apk
        path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Install Dependencies
      run: flutter pub get

    # 💡 دستور جادویی برای ساخت آیکون‌ها و اسپلش در آیفون
    - name: Generate App Icons and Splash
      run: |
        dart run flutter_launcher_icons
        dart run flutter_native_splash:create

    - name: Build iOS Xcode Project
      run: flutter build ios --release --no-codesign

    - name: Compress iOS Output
      run: tar -czf ios-project.tar.gz build/ios/iphoneos

    - name: Upload iOS Project
      uses: actions/upload-artifact@v3
      with:
        name: iran-erbil-ios-project
        path: ios-project.tar.gz